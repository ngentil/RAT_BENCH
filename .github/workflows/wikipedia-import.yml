name: Wikipedia Import

on:
  workflow_dispatch:
    inputs:
      category:
        description: "Product category to import"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - motorcycle
          - ope
          - marine
          - atv
          - engine
      make:
        description: "Single brand to import (leave blank for all brands in category)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (preview only, no DB writes)"
        required: false
        default: true
        type: boolean

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Wikipedia import
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ARGS="--category=${{ inputs.category }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "${{ inputs.make }}" ]; then ARGS="$ARGS --make=${{ inputs.make }}"; fi
          node scripts/wiki-import/wikipedia-import.mjs $ARGS
