name: Wiki Bulk Import

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Which source to import"
        required: true
        default: "nhtsa-motorcycle"
        type: choice
        options:
          - training-data
          - training-data-2-marine
          - training-data-3-dirtbikes
          - training-data-4-everything
          - training-data-5-cruisers
          - training-data-6-sport
          - training-data-7-commercial
          - training-data-8-arborist
          - training-data-9-clones
          - nhtsa-motorcycle
          - nhtsa-all
          - kaggle-motos
          - epa-engines
      dry_run:
        description: "Dry run (no DB writes)"
        required: false
        default: false
        type: boolean
      limit:
        description: "Row limit (blank = no limit)"
        required: false
        default: ""

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run import
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          DRY=""
          LIMIT_ARG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          if [ -n "${{ inputs.limit }}" ]; then LIMIT_ARG="--limit=${{ inputs.limit }}"; fi

          case "${{ inputs.source }}" in
            training-data)
              node scripts/wiki-import/training-data-seed.mjs $DRY $LIMIT_ARG
              ;;
            training-data-2-marine)
              node scripts/wiki-import/training-data-seed-2.mjs $DRY $LIMIT_ARG
              ;;
            training-data-3-dirtbikes)
              node scripts/wiki-import/training-data-seed-3.mjs $DRY $LIMIT_ARG
              ;;
            training-data-4-everything)
              node scripts/wiki-import/training-data-seed-4.mjs $DRY $LIMIT_ARG
              ;;
            training-data-5-cruisers)
              node scripts/wiki-import/training-data-seed-5.mjs $DRY $LIMIT_ARG
              ;;
            training-data-6-sport)
              node scripts/wiki-import/training-data-seed-6.mjs $DRY $LIMIT_ARG
              ;;
            training-data-7-commercial)
              node scripts/wiki-import/training-data-seed-7.mjs $DRY $LIMIT_ARG
              ;;
            training-data-8-arborist)
              node scripts/wiki-import/training-data-seed-8.mjs $DRY $LIMIT_ARG
              ;;
            training-data-9-clones)
              node scripts/wiki-import/training-data-seed-9.mjs $DRY $LIMIT_ARG
              ;;
            nhtsa-motorcycle)
              node scripts/wiki-import/nhtsa.mjs --type=motorcycle $DRY $LIMIT_ARG
              ;;
            nhtsa-all)
              node scripts/wiki-import/nhtsa.mjs $DRY $LIMIT_ARG
              ;;
            kaggle-motos)
              echo "❌ Kaggle CSV must be committed to scripts/wiki-import/kaggle-motos.csv first."
              exit 1
              ;;
            epa-engines)
              echo "❌ EPA CSV must be committed to scripts/wiki-import/epa-engines.csv first."
              exit 1
              ;;
          esac
