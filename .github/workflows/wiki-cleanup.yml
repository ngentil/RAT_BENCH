name: Wiki Cleanup

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Which cleanup to run"
        required: true
        default: "full-cleanup"
        type: choice
        options:
          - full-cleanup
          - deduplicate
          - fix-types
          - thin-entries
          - remove-samples
      min_fields:
        description: "thin-entries only: minimum non-empty fields to keep (default: 10)"
        required: false
        default: "10"
      dry_run:
        description: "Dry run (list what would be deleted, no DB writes)"
        required: false
        default: true
        type: boolean

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run cleanup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          DRY=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi

          case "${{ inputs.task }}" in
            full-cleanup)
              node scripts/wiki-import/cleanup-duplicates.mjs $DRY
              node scripts/wiki-import/cleanup-thin-entries.mjs --min=${{ inputs.min_fields || '10' }} $DRY
              node scripts/wiki-import/reconcile-types.mjs $DRY
              ;;
            deduplicate)
              node scripts/wiki-import/cleanup-duplicates.mjs $DRY
              ;;
            fix-types)
              node scripts/wiki-import/reconcile-types.mjs $DRY
              ;;
            thin-entries)
              node scripts/wiki-import/cleanup-thin-entries.mjs --min=${{ inputs.min_fields || '10' }} $DRY
              ;;
            remove-samples)
              node scripts/wiki-import/remove-sample-entries.mjs $DRY
              ;;
          esac
