         conflicting tags onto a prerendered content page. -->

    <link rel="canonical" href="https://ratbench.net/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Rat Bench" />
    <meta property="og:title" content="Rat Bench — If You've Got a Shed, This Is For You" />
    <meta property="og:description" content="The only digital workbench built specifically for garage mechanics, small engine enthusiasts, and weekend wrenchers." />
    <meta property="og:url" content="https://ratbench.net/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Rat Bench — If You've Got a Shed, This Is For You" />
    <meta name="twitter:description" content="The only digital workbench built specifically for garage mechanics, small engine enthusiasts, and weekend wrenchers." />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Rat Bench",
      "url": "https://ratbench.net/"
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Rat Bench",
      "url": "https://ratbench.net/"
    }
    </script>
    <!-- HOMEPAGE-SEO:END -->
